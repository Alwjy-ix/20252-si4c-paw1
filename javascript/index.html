<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar javacript</title>
</head>
<body>
    <h1>Belajar javacript</h1>
    <p id="demo">Hello</p>

    <!-- inline js -->
     <button onclick="alert('Selamat datang')">Klik</button>

    <!-- internal js -->
    <script>
        // mengubah konten paragraf dengan id "demo"
        document.getElementById("demo").innerHTML = "Hello diubah menjadi selamat datang";

        //mengubah warna parafraf dengan id "demo"
        document.getElementById("demo").style.color = "green";

        //menampilkan pesan di console
        console.log("pesan ini dapat dilihat di console browser");
    </script>

    <!-- external js -->
        <script src="script.js"></script>

</body>
</html>
